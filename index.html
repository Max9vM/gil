      let storeItems = [];

function addToCart(id) {

    let selectedItem = items.find((item) => item.id === id);

    if (!storeItems[id]) {

        storeItems[id] = {
            ...selectedItem,
            quantity: 1
        };

    } else {

        storeItems[id].quantity += 1;
    }

    reloadItems();
}

function changeQuantity(id, change) {

    if (!storeItems[id]) return;

    storeItems[id].quantity += change;

    if (storeItems[id].quantity <= 0) {
        delete storeItems[id];
    }

    reloadItems();
}

function reloadItems() {

    cartcontainer.innerHTML = "";

    let count = 0;
    let totalCount = 0;

    storeItems.forEach((item) => {

        if (!item) return;

        count += item.quantity;

        totalCount += item.price * item.quantity;

        let itemLi = document.createElement("div");

        itemLi.className = "cart-item";

        itemLi.innerHTML = `
            <img src="${item.image}" alt="${item.name}">

            <div class="item-details">

                <h4>${item.name}</h4>

                <p>$${item.price}</p>

                <div class="quantity-controls">

                    <button onclick="changeQuantity(${item.id}, -1)">-</button>

                    <span>${item.quantity}</span>

                    <button onclick="changeQuantity(${item.id}, 1)">+</button>

                </div>

            </div>
        `;

        cartcontainer.appendChild(itemLi);

    });

    quantity.innerHTML = count;

    total.innerHTML = totalCount;
    localStorage.setItem("cartTotal", totalCount);
}
